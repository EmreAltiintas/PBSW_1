name: BDD Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PBSW_1/GrassShop.Tests/GrassShop.Tests.csproj

      - name: Build
        run: dotnet build PBSW_1/GrassShop.Tests/GrassShop.Tests.csproj --no-restore --configuration Release

      - name: Run BDD tests
        run: dotnet test PBSW_1/GrassShop.Tests/GrassShop.Tests.csproj --no-build --configuration Release --verbosity normal
