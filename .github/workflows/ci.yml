
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore
        run: dotnet restore PBSW_1.slnx

      - name: Build
        run: dotnet build PBSW_1.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/GrassShop.Tests/GrassShop.Tests.csproj --no-build --configuration Release --verbosity normal
